<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Dark forest background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E1A12"/>
      <stop offset="100%" stop-color="#081008"/>
    </linearGradient>
    <!-- Green → pink gradient for border -->
    <linearGradient id="border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7ECFA0"/>
      <stop offset="100%" stop-color="#F0A8C0"/>
    </linearGradient>
    <!-- Clip for rounded rect -->
    <clipPath id="clip">
      <rect width="64" height="64" rx="14"/>
    </clipPath>
  </defs>

  <!-- Border ring (gradient) -->
  <rect width="64" height="64" rx="14" fill="url(#border)"/>
  <!-- Background (inset 1.5px) -->
  <rect x="1.5" y="1.5" width="61" height="61" rx="12.5" fill="url(#bg)" clip-path="url(#clip)"/>

  <!-- Subtle dot pattern hint -->
  <circle cx="8"  cy="8"  r="0.9" fill="#7ECFA0" opacity="0.25"/>
  <circle cx="56" cy="8"  r="0.9" fill="#F0A8C0" opacity="0.25"/>
  <circle cx="8"  cy="56" r="0.9" fill="#7ECFA0" opacity="0.25"/>
  <circle cx="56" cy="56" r="0.9" fill="#F0A8C0" opacity="0.25"/>

  <!-- M — pastel green, left side -->
  <text
    x="10"
    y="45"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="32"
    font-weight="700"
    font-style="italic"
    fill="#7ECFA0"
    letter-spacing="-1"
  >M</text>

  <!-- G — pastel pink, right side, slightly lower for editorial offset -->
  <text
    x="33"
    y="49"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="26"
    font-weight="400"
    font-style="italic"
    fill="#F0A8C0"
    opacity="0.92"
  >G</text>
</svg>
